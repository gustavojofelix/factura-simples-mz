name: Build & Deploy Mobile Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy-android:
    name: Deploy Android to Google Play
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Build Web & Sync Android
        run: npm run build:mobile

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Build Android App Bundle (AAB)
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release-keystore.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload to Google Play
        uses: r0adrunner/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICES_JSON_KEY }}
          packageName: com.facturasimples.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  deploy-ios:
    name: Deploy iOS to TestFlight
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Install Apple Certificate and Provisioning Profile
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install Provisioning Profile
        uses: apple-actions/run-provision-profile@v3
        with:
          profile-base64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}

      - name: Build Web & Sync iOS
        run: npm run build:mobile

      - name: Build & Export iOS IPA
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath ios/App/build/App.xcarchive \
                     archive
                     
          xcodebuild -exportArchive \
                     -archivePath ios/App/build/App.xcarchive \
                     -exportOptionsPlist ios/App/App/ExportOptions.plist \
                     -exportPath ios/App/build/output

      - name: Upload to App Store Connect (TestFlight)
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          xcrun altool --upload-app \
                       -f ios/App/build/output/App.ipa \
                       -t ios \
                       --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                       --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER }}"
